<section class="packages-section">
    <div class="container">
        <div class="section-header">

            <hr class="divider-packages">  <!-- make global later  -->

            <h2>Packages</h2>
            <p>
                Explore our range of packages across different categories
            </p>

        </div>

        <div class="gallery-filters" role="tablist">
            <button class="pkg-filter-btn active" data-filter="bridal" aria-pressed="true">Bridal</button>
            <button class="pkg-filter-btn" data-filter="party" aria-pressed="false">Party</button>
            <button class="pkg-filter-btn" data-filter="professional" aria-pressed="false">Professional</button>
        </div>

        <div class="packages-container" id="packagesContainer">
            <!-- Packages header and list inserted by packages.js? I guess bro || Inserted using the below template -->
        </div>

        <template id="packagesTemplate">

            <h3 class="package-header"></h3>
            <p class="package-desc"></p>

            <div class="package-card">

                <h3 class="package-card-header"></h3>
                <p class="package-card-desc"></p>

                <div class="package-price-info">
                    <p class="package-price"></p>
                    <p class="package-price-original"></p>
                    <p class="package-offer"></p>
                </div>

            </div>




        </template>



        <div class="packages-footer">

            <div class="packages-trial"></div>

            <div class="packages-note"></div>

        </div>

    </div>
</section>
