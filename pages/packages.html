      <button class="pkg-filter-btn" data-filter="party" aria-pressed="false">
        <span>✨</span> Party
      </button>
      <button
        class="pkg-filter-btn"
        data-filter="professional"
        aria-pressed="false"
      >
        <span>👥</span> Professional
      </button>
    </div>

    <div class="packages-content">
      <div class="category-header-container">
        <div class="crown-icon" id="categoryIcon">
          <img
            src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjYjg5NTRmIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTExLjU2MiAzLjI2NmEuNS41IDAgMCAxIC44NzYgMEwxNS4zOSA4Ljg3YTEgMSAwIDAgMCAxLjUxNi4yOTRMMjEuMTgzIDUuNWEuNS41IDAgMCAxIC43OTguNTE5bC0yLjgzNCAxMC4yNDZhMSAxIDAgMCAxLS45NTYuNzM0SDUuODFhMSAxIDAgMCAxLS45NTctLjczNEwyLjAyIDYuMDJhLjUuNSAwIDAgMSAuNzk4LS41MTlsNC4yNzYgMy42NjRhMSAxIDAgMCAwIDEuNTE2LS4yOTR6Ii8+PHBhdGggZD0iTTUgMjFoMTQiLz48L3N2Zz4="

    <div class="packages-footer">
      <div class="packages-note-div">
        <p class="packages-note">
          *Note: No payment required when booking through our website
        </p>
      </div>

      <button class="btn-callback">Request Call Back</button>
    </div>
  </div>

  <template id="package-card-template">
    <div class="package-card">
      <div class="popular-badge hidden">⭐ Popular</div>

      <div class="package-card-header">
        <h4 class="package-name"></h4>
        <p class="package-target"></p>
      </div>

      <div class="package-price-info">
        <span class="package-price"></span>
        <span class="package-price-original"></span>
        <span class="package-offer"></span>
      </div>

      <ul class="package-features"></ul>

      <button class="btn-book-now">Book Now</button>
    </div>
  </template>
</section>
