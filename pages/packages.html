<section class="packages-section" id="packages">
  <div class="container">

    <div class="section-header">
      <hr class="divider-packages" />
      <h2>Our Packages</h2>
      <p>Choose from our curated packages designed for every occasion</p>
    </div>

    <div class="packages-filters" role="tablist">

      <button class="pkg-filter-btn active" data-filter="bridal" aria-pressed="true">
        <span class="pkg-icon" data-icon="bridal"></span>
        Bridal
      </button>

      <button class="pkg-filter-btn" data-filter="party" aria-pressed="false">
        <span class="pkg-icon" data-icon="party"></span>
        Party
      </button>

      <button class="pkg-filter-btn" data-filter="professional" aria-pressed="false">
        <span class="pkg-icon" data-icon="professional"></span>
        Professional
      </button>

    </div>

    <div class="packages-content">

      <div class="category-header-container">

        <div class="crown-icon" id="categoryIcon"></div>

        <h3 id="categoryTitle" class="category-title">Bridal Packages</h3>

        <p id="categoryDesc" class="category-desc">
          Customized packages honoring all traditions. Free trial makeup included.
        </p>

      </div>

      <div class="packages-grid" id="packagesGrid"></div>

    </div>

    <div class="packages-footer">
      <div class="packages-note-div">
        <p class="packages-note">
          *Note: No payment required when booking through our website
        </p>
      </div>

      <button class="btn-callback">Request Call Back</button>
    </div>

  </div>

  <template id="package-card-template">
  <div class="package-card">
    <div class="popular-badge hidden">⭐ Popular</div>
    
    <button class="package-toggle" aria-label="Toggle details">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron-icon"><path d="m6 9 6 6 6-6"/></svg>
    </button>

    <div class="package-card-header">
      <h4 class="package-name"></h4>
      <p class="package-target"></p>
    </div>

      <div class="package-price-info">
        <span class="package-price"></span>
        <span class="package-price-original"></span>
        <span class="package-offer"></span>
      </div>

      <ul class="package-features"></ul>

      <button class="btn-book-now">Book Now</button>

    </div>
  </template>

</section>
