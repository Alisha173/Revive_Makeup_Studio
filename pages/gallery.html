 <section class="gallery-section" id="gallery">
  <div class="container">

    <div class="section-header">
      <hr class="section-top-divider" />
      <h2>Our Gallery</h2>
      <p>
        Explore our portfolio showcasing diverse beauty across Kerala's rich cultural traditions
      </p>
    </div>

    <div class="filter-capsule" role="tablist">
      <button class="filter-item active" data-filter="all" aria-pressed="true">
        <span class="filter-icon" data-icon="all"></span>
        All
      </button>
      <button class="filter-item" data-filter="bridal" aria-pressed="false">
        <span class="filter-icon" data-icon="bridal"></span>
        Bridal
      </button>
      <button class="filter-item" data-filter="party" aria-pressed="false">
        <span class="filter-icon" data-icon="party"></span>
        Party
      </button>
      <button class="filter-item" data-filter="professional" aria-pressed="false">
        <span class="filter-icon" data-icon="professional"></span>
        Professional
      </button>
    </div>

    <div class="notification-wrapper">
      <div id="galleryNotification" class="gallery-notification" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path d="m.5 3 .04.87a2 2 0 0 0-.342 1.311l.637 7A2 2 0 0 0 2.826 14H9v-1H2.826a1 1 0 0 1-.995-.91l-.637-7A1 1 0 0 1 2.19 4h11.62a1 1 0 0 1 .996 1.09L14.54 8h1.005l.256-2.819A2 2 0 0 0 13.81 3H9.828a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 6.172 1H2.5a2 2 0 0 0-2 2m5.672-1a1 1 0 0 1 .707.293L7.586 3H2.19q-.362.002-.683.12L1.5 2.98a1 1 0 0 1 1-.98z"/>
        </svg>
        <span>Tap any folder to explore the full album</span>
      </div>
    </div>

    <div class="gallery-grid" id="galleryGrid">
      <!-- Images injected by JS -->
       <template id="card-template">
          <div class="gallery-item"> 
            <div class="gallery-image-container">
              <img src="" alt="" loading="lazy" decoding="async" />
            </div>
            
            <div class="item-count-badge">
              <span class="badge-icon"></span>
              <span class="badge-num"></span>
            </div>
            
          </div>
        </template>
    </div>

  </div>

  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog">
    <div class="lightbox-content">
      <button class="close-btn" aria-label="Close lightbox">&times;</button>

      <div class="lightbox-top-row">
        <div class="lightbox-left">
          <div class="nav-hitbox left" data-nav="prev"></div>
          <div class="nav-hitbox right" data-nav="next"></div>
          <img id="lightboxMainImg" src="" alt="">

          <div id="mobileAltCaption" class="mobile-alt-caption"></div>
        </div>

        <div class="lightbox-right-info">
          <div id="altTextContainer" class="alt-text-list"></div>
        </div>
      </div>

      <div class="lightbox-bottom-tray">
        <div id="thumbnailContainer" class="thumbnail-track"></div>
      </div>
    </div>
  </div>

</section>
